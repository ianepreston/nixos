---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
set: [pipefail]
shopt: [globstar]

includes:
  bootstrap: ./taskfiles/bootstrap.yaml
  maintenance: ./taskfiles/maintenance.yaml
  recovery: ./taskfiles/recovery.yaml
  secrets: ./taskfiles/secrets.yaml
  vm: ./taskfiles/vm.yaml

tasks:
  default:
    cmd: task --list
    silent: true
  fmt:
    desc: Format all Nix files
    cmds:
      - find . -name '*.nix' -not -path './result/*' -exec nixfmt {} +
  check:
    desc: Full pre-push check (nixfmt + statix + deadnix + flake eval)
    # `nix flake check` builds the `checks.<system>.pre-commit` derivation,
    # which runs nixfmt/statix/deadnix via git-hooks.nix — the single
    # source of truth for lint config (incl. the hardware-file excludes).
    # No separate fmt-check/lint tasks: those hand-rolled the same tooling
    # and drifted out of sync (see #239 follow-up — the statix/deadnix CLI
    # invocations didn't match the tools' actual flag semantics).
    cmds:
      - nix flake check --all-systems
  build:
    desc: Build a specific host (default luna)
    vars:
      HOST: '{{.HOST | default "luna"}}'
    cmds:
      - nix build .#nixosConfigurations.{{.HOST}}.config.system.build.toplevel
  build-all:
    desc: Build all NixOS host configurations
    cmds:
      - nix build .#nixosConfigurations.luna.config.system.build.toplevel
      - nix build .#nixosConfigurations.terra.config.system.build.toplevel
      - nix build .#nixosConfigurations.hpp-1.config.system.build.toplevel
      - nix build .#nixosConfigurations.amos1.config.system.build.toplevel
  rebuild:
    desc: rebuild nixos config
    cmd: sudo nixos-rebuild switch --flake . --override-input nix-secrets path:../nix-secrets
  rebuild:*:
    desc: Rebuild a particular config, pass :[hostname] for the target
    cmd: sudo nixos-rebuild switch --flake .#{{ index .MATCH 0 }} --override-input nix-secrets path:../nix-secrets
  deploy:*:
    desc: Build locally and deploy to a live remote host, pass :[hostname] for the target
    cmd: nixos-rebuild switch --flake .#{{ index .MATCH 0 }} --target-host ipreston@{{ index .MATCH 0 }} --sudo --override-input nix-secrets path:../nix-secrets
  build_home:*:
    desc: Rebuild standalone home-manager, pass :[flaketarget] for the target
    cmd: nix shell nixpkgs#home-manager -c home-manager -b bak switch --flake .#{{ index .MATCH 0 }}
  build_darwin:*:
    desc: Rebuild nix-darwin, pass :[flaketarget] for the target
    cmd: sudo darwin-rebuild switch --flake .#{{ index .MATCH 0 }}
  update:
    desc: patch the flake
    cmd: nix flake update
  update_dconf:
    desc: Grab dconf config and pull it into your files, remember to select the key
    cmd: ./scripts/dconf.sh
  garbage_collect:
    desc: remove unreachable store objects and any generations older than a week
    cmd: nix-collect-garbage --delete-older-than 7d
  iso:
    desc: Build the installer/recovery ISO
    cmd: |
      # If we dont remove this folder, libvirtd VM doesnt run with the new iso...
      rm -rf result
      nix build --impure .#nixosConfigurations.iso.config.system.build.isoImage && ln -sf result/iso/*.iso latest.iso
