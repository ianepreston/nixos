---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
set: [pipefail]
shopt: [globstar]
tasks:
  default:
    cmd: task --list
    silent: true
  lint:
    desc: Run nix linters
    cmds:
      - statix check . --ignore result 'modules/hosts/_*-hardware.nix'
      - deadnix --no-underscore --exclude result 'modules/hosts/_*-hardware.nix' .
  fmt:
    desc: Format all Nix files
    cmds:
      - find . -name '*.nix' -not -path './result/*' -exec nixfmt {} +
  fmt-check:
    desc: Check formatting without modifying
    cmds:
      - find . -name '*.nix' -not -path './result/*' -exec nixfmt --check {} +
  check:
    desc: Full pre-push check (format, lint, flake check)
    cmds:
      - task: fmt-check
      - task: lint
      - nix flake check --all-systems
  build:
    desc: Build a specific host (default luna)
    vars:
      HOST: '{{.HOST | default "luna"}}'
    cmds:
      - nix build .#nixosConfigurations.{{.HOST}}.config.system.build.toplevel
  build-all:
    desc: Build all NixOS host configurations
    cmds:
      - nix build .#nixosConfigurations.luna.config.system.build.toplevel
      - nix build .#nixosConfigurations.terra.config.system.build.toplevel
      - nix build .#nixosConfigurations.hpp-1.config.system.build.toplevel
  rebuild:
    desc: rebuild nixos config
    cmd: sudo nixos-rebuild switch --flake . --override-input nix-secrets path:../nix-secrets
  rebuild:*:
    desc: Rebuild a particular config, pass :[hostname] for the target
    cmd: sudo nixos-rebuild switch --flake .#{{ index .MATCH 0 }} --override-input nix-secrets path:../nix-secrets
  deploy:*:
    desc: Build locally and deploy to a live remote host, pass :[hostname] for the target
    cmd: nixos-rebuild switch --flake .#{{ index .MATCH 0 }} --target-host ipreston@{{ index .MATCH 0 }} --sudo --override-input nix-secrets path:../nix-secrets
  build_home:*:
    desc: Rebuild standalone home-manager, pass :[flaketarget] for the target
    cmd: nix shell nixpkgs#home-manager -c home-manager -b bak switch --flake .#{{ index .MATCH 0 }}
  build_darwin:*:
    desc: Rebuild nix-darwin, pass :[flaketarget] for the target
    cmd: sudo darwin-rebuild switch --flake .#{{ index .MATCH 0 }}
  update:
    desc: patch the flake
    cmd: nix flake update
  update_dconf:
    desc: Grab dconf config and pull it into your files, remember to select the key
    cmd: ./scripts/dconf.sh
  garbage_collect:
    desc: remove unreachable store objects and any generations older than a week
    cmd: nix-collect-garbage --delete-older-than 7d
  iso:
    desc: Build the installer/recovery ISO
    cmd: |
      # If we dont remove this folder, libvirtd VM doesnt run with the new iso...
      rm -rf result
      nix build --impure .#nixosConfigurations.iso.config.system.build.isoImage && ln -sf result/iso/*.iso latest.iso
  # ---------------------------------------------------------------------------
  # Bootstrap tasks — install NixOS on a remote target using nixos-anywhere
  # ---------------------------------------------------------------------------
  # Required vars: HOST (hostname), DEST (IP or domain of target)
  # Optional vars: SSH_PORT (default 22), LUKS_PASS (LUKS passphrase, omit if no LUKS)
  bootstrap:new:
    desc: Full pipeline for a brand-new host (install + hwconfig, pause for secrets setup, then sync + rebuild)
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      LUKS_PASS: '{{.LUKS_PASS | default ""}}'
      IMPERMANENT: '{{.IMPERMANENT | default "false"}}'
    cmds:
      - task: bootstrap:install
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}', LUKS_PASS: '{{.LUKS_PASS}}', IMPERMANENT: '{{.IMPERMANENT}}'}
      - |
        echo ""
        echo "===  Installation complete. Waiting for target to reboot.  ==="
        echo "    Press Enter once {{.DEST}} is back up and reachable via SSH."
        read -r
      - task: bootstrap:hwconfig
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
      - task: bootstrap:secrets
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
      - task: bootstrap:sync
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
      - task: bootstrap:rebuild
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
  bootstrap:reinstall:
    desc: Reinstall an existing host that already has secrets configured (install + sync + rebuild)
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      LUKS_PASS: '{{.LUKS_PASS | default ""}}'
      IMPERMANENT: '{{.IMPERMANENT | default "false"}}'
    cmds:
      - task: bootstrap:install
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}', LUKS_PASS: '{{.LUKS_PASS}}', IMPERMANENT: '{{.IMPERMANENT}}'}
      - |
        echo ""
        echo "===  Installation complete. Waiting for target to reboot.  ==="
        echo "    Press Enter once {{.DEST}} is back up and reachable via SSH."
        read -r
      - task: bootstrap:sync
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
      - task: bootstrap:rebuild
        vars: {HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}'}
  bootstrap:install:
    desc: Run nixos-anywhere to install NixOS on the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      LUKS_PASS: '{{.LUKS_PASS | default ""}}'
      # For hosts using preservation-server (impermanent root), also
      # seed the SSH host key into /persist/etc/ssh/ so that on first
      # reboot — when @root is rolled back and preservation bind-mounts
      # /persist/etc/ssh/* over /etc/ssh/* — sshd finds a real key.
      # Default off; opt in per host with IMPERMANENT=true.
      IMPERMANENT: '{{.IMPERMANENT | default "false"}}'
    cmds:
      - |
        set -euo pipefail
        hwfile="modules/hosts/_{{.HOST}}-hardware.nix"
        if [ ! -f "$hwfile" ]; then
          echo -e "\x1B[32m[+] No hardware config found — fetching from {{.DEST}}\x1B[0m"
          ssh -p {{.SSH_PORT}} -oStrictHostKeyChecking=accept-new root@{{.DEST}} \
            "nixos-generate-config --no-filesystems --show-hardware-config" > "$hwfile"
          git add "$hwfile"
          echo -e "\x1B[32m[+] Saved and staged $hwfile\x1B[0m"
        fi
      - |
        set -euo pipefail
        temp=$(mktemp -d)
        trap "rm -rf $temp" EXIT

        echo -e "\x1B[32m[+] Wiping known_hosts entries for {{.DEST}} (port {{.SSH_PORT}})\x1B[0m"
        ssh-keygen -R "{{.DEST}}" -f ~/.ssh/known_hosts 2>/dev/null || true
        ssh-keygen -R "[{{.DEST}}]:{{.SSH_PORT}}" -f ~/.ssh/known_hosts 2>/dev/null || true

        echo -e "\x1B[32m[+] Generating SSH host key for {{.HOST}}\x1B[0m"
        install -d -m755 "$temp/etc/ssh"
        ssh-keygen -t ed25519 -f "$temp/etc/ssh/ssh_host_ed25519_key" -C "root@{{.HOST}}" -N ""
        chmod 600 "$temp/etc/ssh/ssh_host_ed25519_key"

        if [ "{{.IMPERMANENT}}" = "true" ]; then
          echo -e "\x1B[32m[+] IMPERMANENT=true — also seeding /persist/etc/ssh/\x1B[0m"
          install -d -m755 "$temp/persist/etc/ssh"
          cp "$temp/etc/ssh/ssh_host_ed25519_key" "$temp/persist/etc/ssh/ssh_host_ed25519_key"
          cp "$temp/etc/ssh/ssh_host_ed25519_key.pub" "$temp/persist/etc/ssh/ssh_host_ed25519_key.pub"
          chmod 600 "$temp/persist/etc/ssh/ssh_host_ed25519_key"
        fi

        luks_args=""
        if [ -n "{{.LUKS_PASS}}" ]; then
          echo -e "\x1B[32m[+] Setting LUKS passphrase via --disk-encryption-keys\x1B[0m"
          echo "{{.LUKS_PASS}}" > "$temp/luks-passphrase"
          luks_args="--disk-encryption-keys /tmp/disko-password $temp/luks-passphrase"
        fi

        echo -e "\x1B[32m[+] Running nixos-anywhere for {{.HOST}} at {{.DEST}}\x1B[0m"
        # shellcheck disable=SC2086
        nix run github:nix-community/nixos-anywhere -- \
          --ssh-port {{.SSH_PORT}} \
          --post-kexec-ssh-port {{.SSH_PORT}} \
          --extra-files "$temp" \
          $luks_args \
          --flake .#{{.HOST}} \
          root@{{.DEST}}

        host_age_key=$(ssh-to-age < "$temp/etc/ssh/ssh_host_ed25519_key.pub")
        echo ""
        echo "========================================================"
        echo "  Age public key for {{.HOST}}:"
        echo "  $host_age_key"
        echo "========================================================"
        echo ""
        echo "Update nix-secrets/.sops.yaml with the following:"
        echo ""
        echo "  Under keys.hosts:"
        echo "    - &{{.HOST}} $host_age_key"
        echo ""
        echo "  Under creation_rules, add *{{.HOST}} to shared.yaml's age list."
        echo ""
        echo "  Add a new creation rule for {{.HOST}}:"
        echo "    - path_regex: {{.HOST}}\\.yaml\$"
        echo "      key_groups:"
        echo "        - age:"
        echo "            - *ipreston"
        echo "            - *{{.HOST}}"
  bootstrap:hwconfig:
    desc: Extract hardware-configuration.nix from the target and save it locally
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        outfile="modules/hosts/_{{.HOST}}-hardware.nix"
        echo -e "\x1B[32m[+] Generating hardware config from {{.DEST}} -> $outfile\x1B[0m"
        ssh -p {{.SSH_PORT}} -oStrictHostKeyChecking=accept-new {{.TARGET_USER}}@{{.DEST}} \
          "sudo nixos-generate-config --no-filesystems --show-hardware-config" > "$outfile"
        echo -e "\x1B[32m[+] Saved to $outfile\x1B[0m"
  bootstrap:hostkey:
    desc: Derive age public key from target's SSH host key and print SOPS update instructions
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Scanning SSH host key from {{.DEST}}\x1B[0m"
        host_age_key=$(ssh-keyscan -4 -p {{.SSH_PORT}} -t ed25519 {{.DEST}} 2>/dev/null \
          | grep ssh-ed25519 | cut -f2- -d" " | ssh-to-age)

        if ! echo "$host_age_key" | grep -q '^age1'; then
          echo -e "\x1B[31m[!] Failed to derive age key. Is the target up and SSH accessible?\x1B[0m"
          exit 1
        fi

        echo ""
        echo "========================================================"
        echo "  Age public key for {{.HOST}}:"
        echo "  $host_age_key"
        echo "========================================================"
        echo ""
        echo "Update nix-secrets/.sops.yaml with the following:"
        echo ""
        echo "  Under keys.hosts:"
        echo "    - &{{.HOST}} $host_age_key"
        echo ""
        echo "  Under creation_rules, add *{{.HOST}} to shared.yaml's age list."
        echo ""
        echo "  Add a new creation rule for {{.HOST}}:"
        echo "    - path_regex: {{.HOST}}\\.yaml\$"
        echo "      key_groups:"
        echo "        - age:"
        echo "            - *ipreston"
        echo "            - *{{.HOST}}"
        echo ""
        echo "Then: cd ../nix-secrets && sops updatekeys sops/*.yaml && git add -A && git commit -m 'add {{.HOST}} keys' && git push"
        echo "Then: nix flake update nix-secrets  (back in this repo)"
  bootstrap:secrets:
    desc: Add host age key to nix-secrets, create host secrets file, and commit
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
    cmds:
      - |
        set -euo pipefail
        git_root=$(git rev-parse --show-toplevel)
        secrets_dir="$git_root/../nix-secrets"
        sops_yaml="$secrets_dir/.sops.yaml"
        host="{{.HOST}}"

        # Derive age key from the live host
        echo -e "\x1B[32m[+] Deriving age key from {{.DEST}}\x1B[0m"
        host_age_key=$(ssh-keyscan -4 -p {{.SSH_PORT}} -t ed25519 {{.DEST}} 2>/dev/null \
          | grep ssh-ed25519 | cut -f2- -d" " | ssh-to-age)

        if ! echo "$host_age_key" | grep -q '^age1'; then
          echo -e "\x1B[31m[!] Failed to derive age key. Is the target up and SSH accessible?\x1B[0m"
          exit 1
        fi
        echo "  Age key: $host_age_key"

        # Update .sops.yaml
        if grep -q "&${host} " "$sops_yaml"; then
          echo -e "\x1B[33m[~] $host already in .sops.yaml — updating key\x1B[0m"
          sed -i "s|&${host} age1.*|\&${host} $host_age_key|" "$sops_yaml"
        else
          echo -e "\x1B[32m[+] Adding $host to .sops.yaml\x1B[0m"
          # Add host key anchor under keys.hosts (before creation_rules)
          sed -i "/^creation_rules:/i\\    - \&${host} $host_age_key" "$sops_yaml"
          # Add *host to shared.yaml's age list (after the last existing entry)
          sed -i "/path_regex: shared/,/^ *- path_regex:/{s/^\( *- \*[a-z][a-z_]*\)$/\1\n          - *${host}/}" "$sops_yaml"
          # Deduplicate the shared block in case of double-insertion
          awk -v pat="          - *${host}" 'BEGIN{c=0} $0==pat{c++;if(c>1)next} {print}' "$sops_yaml" > "$sops_yaml.tmp" && mv "$sops_yaml.tmp" "$sops_yaml"
          # Append creation rule for host.yaml
          printf '  - path_regex: %s\\.yaml$\n    key_groups:\n      - age:\n          - *ipreston\n          - *%s\n' "$host" "$host" >> "$sops_yaml"
        fi

        # Create host secrets file with a generated SSH key
        host_secrets="$secrets_dir/sops/${host}.yaml"
        host_pubkey="$git_root/modules/profiles/_ssh-keys/id_${host}.pub"
        if [ -f "$host_secrets" ]; then
          echo -e "\x1B[33m[~] $host_secrets already exists — skipping\x1B[0m"
        else
          echo -e "\x1B[32m[+] Creating $host_secrets with generated SSH key\x1B[0m"
          temp=$(mktemp -d)
          trap "rm -rf $temp" EXIT
          ssh-keygen -t ed25519 -f "$temp/id_ed25519" -C "${host}" -N "" -q
          printf 'ssh:\n    ed25519: |\n' > "$host_secrets"
          sed 's/^/        /' "$temp/id_ed25519" >> "$host_secrets"
          sops --config "$sops_yaml" --encrypt --in-place "$host_secrets"

          echo -e "\x1B[32m[+] Saving public key to $host_pubkey\x1B[0m"
          install -m644 "$temp/id_ed25519.pub" "$host_pubkey"
          git -C "$git_root" add "$host_pubkey"
        fi

        # Re-encrypt shared secrets for the new host
        echo -e "\x1B[32m[+] Updating shared secrets keys\x1B[0m"
        cd "$secrets_dir"
        sops updatekeys --yes sops/shared.yaml

        # Commit
        echo -e "\x1B[32m[+] Committing nix-secrets changes\x1B[0m"
        git add -A
        git diff --cached --quiet && echo -e "\x1B[33m[~] No changes to commit\x1B[0m" \
          || { git commit -m "add ${host} host key and secrets"; echo -e "\x1B[32m[+] Done. nix-secrets committed (not pushed).\x1B[0m"; }
  bootstrap:sync:
    desc: Rsync nixos and nix-secrets configs to the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        git_root=$(git rev-parse --show-toplevel)

        echo -e "\x1B[32m[+] Updating known_hosts for {{.DEST}}\x1B[0m"
        ssh-keygen -R "{{.DEST}}" -f ~/.ssh/known_hosts 2>/dev/null || true
        ssh-keygen -R "[{{.DEST}}]:{{.SSH_PORT}}" -f ~/.ssh/known_hosts 2>/dev/null || true
        ssh-keyscan -p {{.SSH_PORT}} {{.DEST}} 2>/dev/null | grep -v '^#' >> ~/.ssh/known_hosts || true

        echo -e "\x1B[32m[+] Syncing nixos config to {{.DEST}}\x1B[0m"
        rsync -av --mkpath --filter=':- .gitignore' \
          -e "ssh -oport={{.SSH_PORT}} -l {{.TARGET_USER}}" \
          "$git_root"/../nixos "{{.TARGET_USER}}@{{.DEST}}:src/"

        echo -e "\x1B[32m[+] Syncing nix-secrets to {{.DEST}}\x1B[0m"
        rsync -av --mkpath --filter=':- .gitignore' \
          -e "ssh -oport={{.SSH_PORT}} -l {{.TARGET_USER}}" \
          "$git_root"/../nix-secrets "{{.TARGET_USER}}@{{.DEST}}:src/"
  bootstrap:rebuild:
    desc: Run nixos-rebuild switch on the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Rebuilding {{.HOST}} on {{.DEST}}\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          "cd src/nixos && sudo nixos-rebuild switch --flake .#{{.HOST}} --override-input nix-secrets path:../nix-secrets"

  # ---------------------------------------------------------------------------
  # verify:restore — quarterly restic restore drill (issue #135)
  # ---------------------------------------------------------------------------
  # WHAT THIS DOES
  #   End-to-end exercise of the README "Restore runbook" against a throwaway
  #   target. Confirms last night's restic snapshot is actually replayable
  #   into a working app, covering the three app shapes in this repo:
  #
  #     - containerized + postgres : mealie    (volume + db)
  #     - DynamicUser 12-factor    : miniflux  (db only)
  #     - SQLite-quiesce native    : jellyfin  (live tree + staged .db)
  #
  #   Steps:
  #     1. Reinstall HOST via nixos-anywhere (bootstrap:reinstall).
  #     2. Mount the SOURCE_HOST restic repo (NFS share at
  #        /mnt/backups/restic/<SOURCE_HOST>).
  #     3. Run each per-app restore exactly as documented in the README.
  #     4. Assert HTTP 200 against the upstream port of each app
  #        (localhost:9925 / localhost:8089 / localhost:8096). Caddy isn't
  #        asserted because that needs LAN DNS for *.<serverDomain> to
  #        resolve onto the testvm — verifying the upstream is what
  #        proves the restore worked.
  #
  # WHEN TO RUN
  #   Quarterly. Calendar reminder, not a systemd timer — restic restores
  #   are destructive on the target and the operator should be watching.
  #
  # PREREQUISITES
  #   - HOST must be a host that imports `server` + `server-apps` so that
  #     the mealie / miniflux / jellyfin modules (and the postgres
  #     cluster they depend on) are actually present. The repo's testvm
  #     host is intentionally minimal; before running this drill, either
  #     temporarily expand modules/hosts/testvm.nix to import those
  #     profiles, or aim HOST at a separate sacrificial server.
  #   - SOURCE_HOST is a live server whose restic repo is reachable from
  #     the target via the NFS-mounted backup share (same /mnt/backups
  #     layout used by services.restic.backups.server). The drill replays
  #     `latest` from that repo.
  #   - LAN reachability from your workstation to DEST on SSH_PORT.
  #
  # USAGE
  #   task verify:restore HOST=testvm DEST=192.168.10.50 SOURCE_HOST=hpp-1
  #
  # TEARDOWN
  #   The target is left running so you can poke at it post-drill. To
  #   reclaim, just destroy/reimage the VM — there's no cleanup step in
  #   the task itself.

  verify:restore:
    desc: Quarterly restic restore drill — reinstall HOST, restore mealie/miniflux/jellyfin from SOURCE_HOST's repo, assert HTTP 200
    requires:
      vars: [HOST, DEST, SOURCE_HOST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
      LUKS_PASS: '{{.LUKS_PASS | default ""}}'
      IMPERMANENT: '{{.IMPERMANENT | default "true"}}'
    cmds:
      - task: bootstrap:reinstall
        vars:
          HOST: '{{.HOST}}'
          DEST: '{{.DEST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          LUKS_PASS: '{{.LUKS_PASS}}'
          IMPERMANENT: '{{.IMPERMANENT}}'
      - task: verify:restore:mealie
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}', TARGET_USER: '{{.TARGET_USER}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - task: verify:restore:miniflux
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}', TARGET_USER: '{{.TARGET_USER}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - task: verify:restore:jellyfin
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}', TARGET_USER: '{{.TARGET_USER}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - |
        echo ""
        echo -e "\x1B[32m========================================================\x1B[0m"
        echo -e "\x1B[32m  Restore drill PASSED for {{.HOST}} from {{.SOURCE_HOST}}\x1B[0m"
        echo -e "\x1B[32m  All three app shapes restored cleanly and returned 200.\x1B[0m"
        echo -e "\x1B[32m========================================================\x1B[0m"

  verify:restore:mealie:
    desc: Restore mealie (containerized + postgres shape) and assert HTTP 200
    requires:
      vars: [HOST, DEST, SOURCE_HOST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring mealie on {{.HOST}} from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<'EOF'
        set -euo pipefail
        REPO=/mnt/backups/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password

        echo "[+] Stopping mealie unit"
        systemctl stop mealie.service || true

        echo "[+] Restoring /var/lib/mealie from latest snapshot"
        restic -r "$REPO" --password-file "$PASS_FILE" \
          restore latest --target / --include /var/lib/mealie

        echo "[+] Restoring /var/backup/postgresql from latest snapshot"
        restic -r "$REPO" --password-file "$PASS_FILE" \
          restore latest --target / --include /var/backup/postgresql

        echo "[+] Replaying mealie database from pg_dumpall"
        sudo -u postgres dropdb --if-exists mealie
        sudo -u postgres createdb -O mealie mealie
        zcat /var/backup/postgresql/all.sql.gz | awk '
          /^\\connect / { db = $2; gsub(/"/, "", db); in_target = (db == "mealie"); next }
          in_target { print }
        ' | sudo -u postgres psql -v ON_ERROR_STOP=1 mealie

        echo "[+] Starting mealie"
        systemctl start mealie.service
        EOF
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Asserting HTTP 200 on mealie upstream\x1B[0m"
        ssh -p {{.SSH_PORT}} {{.TARGET_USER}}@{{.DEST}} '
          set -euo pipefail
          for i in $(seq 1 30); do
            code=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:9925/ || true)
            if [ "$code" = "200" ]; then echo "mealie: 200 OK"; exit 0; fi
            sleep 2
          done
          echo "mealie: did not return 200 within 60s (last code: $code)"; exit 1
        '

  verify:restore:miniflux:
    desc: Restore miniflux (DynamicUser + postgres shape) and assert HTTP 200
    requires:
      vars: [HOST, DEST, SOURCE_HOST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring miniflux on {{.HOST}} from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<'EOF'
        set -euo pipefail
        REPO=/mnt/backups/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password

        echo "[+] Stopping miniflux unit"
        systemctl stop miniflux.service || true

        # /var/backup/postgresql was already restored as part of the mealie
        # leg in the same drill run, but re-pull it here so this subtask is
        # independently runnable.
        echo "[+] Restoring /var/backup/postgresql from latest snapshot"
        restic -r "$REPO" --password-file "$PASS_FILE" \
          restore latest --target / --include /var/backup/postgresql

        echo "[+] Replaying miniflux database from pg_dumpall"
        sudo -u postgres dropdb --if-exists miniflux
        sudo -u postgres createdb -O miniflux miniflux
        zcat /var/backup/postgresql/all.sql.gz | awk '
          /^\\connect / { db = $2; gsub(/"/, "", db); in_target = (db == "miniflux"); next }
          in_target { print }
        ' | sudo -u postgres psql -v ON_ERROR_STOP=1 miniflux

        echo "[+] Starting miniflux"
        systemctl start miniflux.service
        EOF
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Asserting HTTP 200 on miniflux upstream\x1B[0m"
        ssh -p {{.SSH_PORT}} {{.TARGET_USER}}@{{.DEST}} '
          set -euo pipefail
          for i in $(seq 1 30); do
            # miniflux returns 302 -> /login (or OIDC redirect) when healthy;
            # accept any 2xx/3xx as evidence the binary is up.
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8089/healthcheck || true)
            if [ "$code" = "200" ]; then echo "miniflux: 200 OK"; exit 0; fi
            sleep 2
          done
          echo "miniflux: did not return 200 within 60s (last code: $code)"; exit 1
        '

  verify:restore:jellyfin:
    desc: Restore jellyfin (SQLite-quiesce native shape) and assert HTTP 200
    requires:
      vars: [HOST, DEST, SOURCE_HOST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring jellyfin on {{.HOST}} from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<'EOF'
        set -euo pipefail
        REPO=/mnt/backups/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password

        echo "[+] Stopping jellyfin unit"
        systemctl stop jellyfin.service || true

        echo "[+] Restoring /var/lib/jellyfin and /var/backup/sqlite/jellyfin from latest snapshot"
        restic -r "$REPO" --password-file "$PASS_FILE" \
          restore latest --target / \
          --include /var/lib/jellyfin \
          --include /var/backup/sqlite/jellyfin

        # The live SQLite file may have been torn mid-write inside the
        # snapshot; the staged copy from sqlite-quiesce is the authoritative
        # one. Match owner/group to whichever server-env user exists on
        # the host (server-dev on dev hosts, server-prod on prod).
        SERVER_USER=$(getent passwd server-prod >/dev/null && echo server-prod || echo server-dev)
        echo "[+] Swapping live jellyfin.db for staged copy (owner: $SERVER_USER)"
        install -o "$SERVER_USER" -g servers -m 0640 \
          /var/backup/sqlite/jellyfin/jellyfin.db \
          /var/lib/jellyfin/data/jellyfin.db

        echo "[+] Starting jellyfin"
        systemctl start jellyfin.service
        EOF
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Asserting HTTP 200 on jellyfin upstream\x1B[0m"
        ssh -p {{.SSH_PORT}} {{.TARGET_USER}}@{{.DEST}} '
          set -euo pipefail
          for i in $(seq 1 60); do
            code=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8096/health || true)
            if [ "$code" = "200" ]; then echo "jellyfin: 200 OK"; exit 0; fi
            sleep 2
          done
          echo "jellyfin: did not return 200 within 120s (last code: $code)"; exit 1
        '
