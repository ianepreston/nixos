---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
set: [pipefail]
shopt: [globstar]
tasks:
  default:
    cmd: task --list
    silent: true
  lint:
    desc: Run nix linters
    cmds:
      - statix check . --ignore result
      - deadnix --no-underscore --exclude result .
  fmt:
    desc: Format all Nix files
    cmds:
      - find . -name '*.nix' -not -path './result/*' -exec nixfmt {} +
  fmt-check:
    desc: Check formatting without modifying
    cmds:
      - find . -name '*.nix' -not -path './result/*' -exec nixfmt --check {} +
  check:
    desc: Full pre-push check (format, lint, flake check)
    cmds:
      - task: fmt-check
      - task: lint
      - nix flake check --all-systems
  build:
    desc: Build a specific host (default luna)
    vars:
      HOST: '{{.HOST | default "luna"}}'
    cmds:
      - nix build .#nixosConfigurations.{{.HOST}}.config.system.build.toplevel
  build-all:
    desc: Build all NixOS host configurations
    cmds:
      - nix build .#nixosConfigurations.luna.config.system.build.toplevel
      - nix build .#nixosConfigurations.terra.config.system.build.toplevel
      - nix build .#nixosConfigurations.toshibachromebook.config.system.build.toplevel
  rebuild:
    desc: rebuild nixos config
    cmd: sudo nixos-rebuild switch --flake .
  rebuild:*:
    desc: Rebuild a particular config, pass :[hostname] for the target
    cmd: sudo nixos-rebuild switch --flake .#{{ index .MATCH 0 }}
  build_home:*:
    desc: Rebuild standalone home-manager, pass :[flaketarget] for the target
    cmd: nix shell nixpkgs#home-manager -c home-manager -b bak switch --flake .#{{ index .MATCH 0 }}
  build_darwin:*:
    desc: Rebuild nix-darwin, pass :[flaketarget] for the target
    cmd: sudo darwin-rebuild switch --flake .#{{ index .MATCH 0 }}
  update:
    desc: patch the flake
    cmd: nix flake update
  update_dconf:
    desc: Grab dconf config and pull it into your files, remember to select the key
    cmd: ./scripts/dconf.sh
  garbage_collect:
    desc: remove unreachable store objects and any generations older than a week
    cmd: nix-collect-garbage --delete-older-than 7d
  iso:
    desc: Build the installer/recovery ISO
    cmd: |
      # If we dont remove this folder, libvirtd VM doesnt run with the new iso...
      rm -rf result
      nix build --impure .#nixosConfigurations.iso.config.system.build.isoImage && ln -sf result/iso/*.iso latest.iso

  # ---------------------------------------------------------------------------
  # Bootstrap tasks — install NixOS on a remote target using nixos-anywhere
  # ---------------------------------------------------------------------------
  # Required vars: HOST (hostname), DEST (IP or domain of target)
  # Optional vars: SSH_PORT (default 22), LUKS_PASS (LUKS passphrase, omit if no LUKS)

  bootstrap:new:
    desc: Full bootstrap pipeline for a new host (install + hwconfig + hostkey + sync + rebuild)
    requires:
      vars: [HOST, DEST]
    cmds:
      - task: bootstrap:install
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}' }
      - echo ""
      - echo "===  Installation complete. Waiting for target to reboot.  ==="
      - echo "    Press Enter once {{.DEST}} is back up and reachable via SSH."
      - read -r
      - task: bootstrap:hwconfig
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}' }
      - task: bootstrap:hostkey
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}' }
      - task: bootstrap:sync
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}' }
      - task: bootstrap:rebuild
        vars: { HOST: '{{.HOST}}', DEST: '{{.DEST}}' }

  bootstrap:install:
    desc: Run nixos-anywhere to install NixOS on the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      LUKS_PASS: '{{.LUKS_PASS | default ""}}'
    cmds:
      - |
        set -euo pipefail
        temp=$(mktemp -d)
        trap "rm -rf $temp" EXIT

        echo -e "\x1B[32m[+] Wiping known_hosts entries for {{.DEST}}\x1B[0m"
        sed -i '/{{.DEST}}/d' ~/.ssh/known_hosts 2>/dev/null || true

        echo -e "\x1B[32m[+] Generating SSH host key for {{.HOST}}\x1B[0m"
        install -d -m755 "$temp/etc/ssh"
        ssh-keygen -t ed25519 -f "$temp/etc/ssh/ssh_host_ed25519_key" -C "root@{{.HOST}}" -N ""
        chmod 600 "$temp/etc/ssh/ssh_host_ed25519_key"

        luks_args=""
        if [ -n "{{.LUKS_PASS}}" ]; then
          echo -e "\x1B[32m[+] Setting LUKS passphrase via --disk-encryption-keys\x1B[0m"
          echo "{{.LUKS_PASS}}" > "$temp/luks-passphrase"
          luks_args="--disk-encryption-keys /tmp/disko-password $temp/luks-passphrase"
        fi

        echo -e "\x1B[32m[+] Running nixos-anywhere for {{.HOST}} at {{.DEST}}\x1B[0m"
        # shellcheck disable=SC2086
        nix run github:nix-community/nixos-anywhere -- \
          --ssh-port {{.SSH_PORT}} \
          --post-kexec-ssh-port {{.SSH_PORT}} \
          --extra-files "$temp" \
          $luks_args \
          --flake .#{{.HOST}} \
          root@{{.DEST}}

  bootstrap:hwconfig:
    desc: Extract hardware-configuration.nix from the target and save it locally
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        outfile="modules/hosts/_{{.HOST}}-hardware.nix"
        echo -e "\x1B[32m[+] Generating hardware config from {{.DEST}} -> $outfile\x1B[0m"
        ssh -p {{.SSH_PORT}} -oStrictHostKeyChecking=accept-new {{.TARGET_USER}}@{{.DEST}} \
          "sudo nixos-generate-config --no-filesystems --show-hardware-config" > "$outfile"
        echo -e "\x1B[32m[+] Saved to $outfile\x1B[0m"

  bootstrap:hostkey:
    desc: Derive age public key from target's SSH host key and print SOPS update instructions
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Scanning SSH host key from {{.DEST}}\x1B[0m"
        host_age_key=$(ssh-keyscan -4 -p {{.SSH_PORT}} -t ed25519 {{.DEST}} 2>/dev/null \
          | grep ssh-ed25519 | cut -f2- -d" " | ssh-to-age)

        if ! echo "$host_age_key" | grep -q '^age1'; then
          echo -e "\x1B[31m[!] Failed to derive age key. Is the target up and SSH accessible?\x1B[0m"
          exit 1
        fi

        echo ""
        echo "========================================================"
        echo "  Age public key for {{.HOST}}:"
        echo "  $host_age_key"
        echo "========================================================"
        echo ""
        echo "Update nix-secrets/.sops.yaml with the following:"
        echo ""
        echo "  Under keys.hosts:"
        echo "    - &{{.HOST}} $host_age_key"
        echo ""
        echo "  Under creation_rules, add *{{.HOST}} to shared.yaml's age list."
        echo ""
        echo "  Add a new creation rule for {{.HOST}}:"
        echo "    - path_regex: {{.HOST}}\\.yaml\$"
        echo "      key_groups:"
        echo "        - age:"
        echo "            - *ipreston"
        echo "            - *{{.HOST}}"
        echo ""
        echo "Then: cd ../nix-secrets && sops updatekeys sops/*.yaml && git add -A && git commit -m 'add {{.HOST}} keys' && git push"
        echo "Then: nix flake update nix-secrets  (back in this repo)"

  bootstrap:sync:
    desc: Rsync nixos and nix-secrets configs to the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        git_root=$(git rev-parse --show-toplevel)

        echo -e "\x1B[32m[+] Adding {{.DEST}} to known_hosts\x1B[0m"
        ssh-keyscan -p {{.SSH_PORT}} {{.DEST}} 2>/dev/null | grep -v '^#' >> ~/.ssh/known_hosts || true

        echo -e "\x1B[32m[+] Syncing nixos config to {{.DEST}}\x1B[0m"
        rsync -av --mkpath --filter=':- .gitignore' \
          -e "ssh -oport={{.SSH_PORT}} -l {{.TARGET_USER}}" \
          "$git_root"/../nixos "{{.TARGET_USER}}@{{.DEST}}:src/"

        echo -e "\x1B[32m[+] Syncing nix-secrets to {{.DEST}}\x1B[0m"
        rsync -av --mkpath --filter=':- .gitignore' \
          -e "ssh -oport={{.SSH_PORT}} -l {{.TARGET_USER}}" \
          "$git_root"/../nix-secrets "{{.TARGET_USER}}@{{.DEST}}:src/"

  bootstrap:rebuild:
    desc: Run nixos-rebuild switch on the target
    requires:
      vars: [HOST, DEST]
    vars:
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Rebuilding {{.HOST}} on {{.DEST}}\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          "cd src/nixos && sudo nixos-rebuild switch --flake .#{{.HOST}} --override-input nix-secrets path:../nix-secrets"
