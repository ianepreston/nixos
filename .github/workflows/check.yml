---
name: check
on:
  push:
    branches: [main]
  pull_request:
# Cancel superseded runs on the same ref to avoid wasting minutes when
# pushing rapid follow-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flake-check:
    name: nix flake check
    # Self-hosted on hpp-1 — eval walks every NixOS config's drvPath,
    # which pulls every flake input. Warm /nix/store on hpp-1 makes
    # this seconds instead of minutes. Same fork-PR guard as the
    # build job: workflow YAML can be edited by fork PRs and would
    # otherwise run on our host.
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      # nix-secrets is a private flake input fetched via git+ssh from
      # github.com/ianepreston/nix-secrets. Inside CI we use a deploy
      # key (read-only) registered on that repo to authenticate; the
      # ssh-agent loaded here is what nix's git fetcher picks up when
      # cloning the input.
      - name: Authorize nix-secrets clone
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
      # `nix flake check --all-systems` evaluates every config in
      # parallel and on Determinate Nix's Linux runner consistently
      # hits "path '...-source' is not valid" on filtered sub-paths
      # of transitive flake inputs (e.g. napalm's
      # `lib.cleanSource ./napalm-registry`) — concurrent addToStore
      # for sub-paths from git-cache-backed flake inputs races and
      # leaves the path registered-but-empty. Walking every NixOS
      # config sequentially via drvPath avoids the race and is the
      # coverage that matters (darwin/home configs are deployed from
      # local Darwin where local task check already gates them).
      - name: Eval each NixOS config
        run: |
          set -euo pipefail
          for host in $(nix eval --json '.#nixosConfigurations' \
              --apply 'cfgs: builtins.attrNames cfgs' | jq -r '.[]'); do
            echo "::group::nixosConfigurations.$host"
            nix eval --raw \
              ".#nixosConfigurations.$host.config.system.build.toplevel.drvPath"
            echo
            echo "::endgroup::"
          done
  build:
    name: build ${{ matrix.host }}
    # Self-hosted runner on hpp-1 shares its warm /nix/store with CI,
    # so unchanged closures rebuild in seconds. See #180 for the design.
    #
    # PR-from-fork guard: a fork PR can edit this workflow and run
    # arbitrary code on our host. Restrict the build job to push events
    # and to PRs whose head branch lives in this repo. Fork PRs still
    # get `flake-check` above (cloud runner, no host access).
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nixos]
    strategy:
      # Surface every failing host on a single PR rather than bailing
      # on the first red.
      fail-fast: false
      matrix:
        # Every real-hardware host: hpp-1 exercises the full server
        # profile (server + server-apps); terra and luna exercise the
        # workstation profile; amos1 is the second prod server. Builds on
        # hpp-1 hit the warm store for everything except host-specific
        # hardware/wm bits — net: a few seconds-to-minutes cold, free
        # warm. (Test/VM/ISO targets stay excluded.)
        host: [hpp-1, terra, amos1, luna]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      - name: Authorize nix-secrets clone
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
      - name: Build ${{ matrix.host }}
        run: |
          nix build \
            --print-build-logs \
            ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel"
