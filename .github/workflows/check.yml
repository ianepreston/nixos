---
name: check
on:
  push:
    branches: [main]
  pull_request:
# Cancel superseded runs on the same ref to avoid wasting minutes when
# pushing rapid follow-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flake-check:
    name: nix flake check
    # Self-hosted on hpp-1 — eval walks every NixOS config's drvPath,
    # which pulls every flake input. Warm /nix/store on hpp-1 makes
    # this seconds instead of minutes. Same fork-PR guard as the
    # build job: workflow YAML can be edited by fork PRs and would
    # otherwise run on our host.
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      # nix-secrets is a private flake input fetched via git+ssh from
      # github.com/ianepreston/nix-secrets. Inside CI we use a deploy
      # key (read-only) registered on that repo to authenticate; the
      # ssh-agent loaded here is what nix's git fetcher picks up when
      # cloning the input.
      - name: Authorize nix-secrets clone
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
      # `nix flake check --all-systems` evaluates every config in
      # parallel and on Determinate Nix's Linux runner consistently
      # hits "path '...-source' is not valid" on filtered sub-paths
      # of transitive flake inputs (e.g. napalm's
      # `lib.cleanSource ./napalm-registry`) — concurrent addToStore
      # for sub-paths from git-cache-backed flake inputs races and
      # leaves the path registered-but-empty. Walking every NixOS
      # config sequentially via drvPath avoids the race and is the
      # coverage that matters. The darwin/home configs are evaluated in
      # the same sequential-drvPath style below (see #349) — they pull
      # the private nix-secrets input too, so they belong on this
      # deploy-key-authorized, fork-guarded job rather than the public
      # cloud-runner lint job.
      - name: Eval each NixOS config
        run: |
          set -euo pipefail
          for host in $(nix eval --json '.#nixosConfigurations' \
              --apply 'cfgs: builtins.attrNames cfgs' | jq -r '.[]'); do
            echo "::group::nixosConfigurations.$host"
            nix eval --raw \
              ".#nixosConfigurations.$host.config.system.build.toplevel.drvPath"
            echo
            echo "::endgroup::"
          done
      # darwin/home configs only *build* on macOS, but they *evaluate*
      # fine on Linux — so eval their drvPaths here to catch a Renovate
      # input bump that breaks them (closes #349). They're not in
      # nixosConfigurations, so they need their own eval calls (darwin
      # via config.system.build.toplevel, home-manager via
      # activationPackage).
      - name: Eval darwin and home configs
        run: |
          set -euo pipefail
          echo "::group::darwinConfigurations.work"
          nix eval --raw \
            ".#darwinConfigurations.work.config.system.build.toplevel.drvPath"
          echo
          echo "::endgroup::"
          echo "::group::homeConfigurations.penguin"
          nix eval --raw \
            ".#homeConfigurations.penguin.activationPackage.drvPath"
          echo
          echo "::endgroup::"
  build:
    name: build ${{ matrix.host }}
    # Self-hosted runner on hpp-1 shares its warm /nix/store with CI,
    # so unchanged closures rebuild in seconds. See #180 for the design.
    #
    # PR-from-fork guard: a fork PR can edit this workflow and run
    # arbitrary code on our host. Restrict the build job to push events
    # and to PRs whose head branch lives in this repo. Fork PRs still
    # get `flake-check` above (cloud runner, no host access).
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nixos]
    strategy:
      # Surface every failing host on a single PR rather than bailing
      # on the first red.
      fail-fast: false
      matrix:
        # Every real-hardware host: hpp-1 exercises the full server
        # profile (server + server-apps); terra and luna exercise the
        # workstation profile; amos1 is the second prod server. Builds on
        # hpp-1 hit the warm store for everything except host-specific
        # hardware/wm bits — net: a few seconds-to-minutes cold, free
        # warm. (Test/VM/ISO targets stay excluded.)
        host: [hpp-1, terra, amos1, luna]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      - name: Authorize nix-secrets clone
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
      - name: Build ${{ matrix.host }}
        run: |
          nix build \
            --print-build-logs \
            ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel"
  checks:
    name: build NixOS VM checks
    # Builds the flake's NixOS VM integration checks. Building a
    # `runNixOSTest` derivation *runs* the test in a QEMU VM and fails
    # on any assertion failure — so `nix build` of the derivation is
    # the test run. Today that's checks.x86_64-linux.rollback-root-resilience
    # (modules/flake/checks-rollback-root.nix), guarding the
    # btrfs-rollback-with-nested-subvolumes regression (#310). Neither
    # flake-check (evals each config's drvPath) nor build (builds each
    # host's toplevel) touches checks.*, so without this job the VM
    # test is never built and never runs.
    #
    # We build the check derivation directly rather than via
    # `nix flake check` on purpose: `nix flake check --all-systems`
    # races on concurrent addToStore for filtered sub-paths of
    # transitive flake inputs on this runner (see the long comment on
    # flake-check above). A targeted `nix build` sidesteps that race
    # while still exercising the VM test.
    #
    # Same fork-PR guard as build: the workflow YAML can be edited by
    # fork PRs, which would otherwise run arbitrary code on our host.
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nixos]
    needs: flake-check
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      - name: Authorize nix-secrets clone
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
      - name: Build rollback-root-resilience VM test
        run: |
          nix build \
            --print-build-logs \
            ".#checks.x86_64-linux.rollback-root-resilience"
  lint:
    name: pre-commit hooks
    # Builds checks.x86_64-linux.pre-commit — the check the
    # git-hooks.flakeModule exposes (nixfmt, statix, deadnix,
    # ripsecrets, check-yaml/json, whitespace; see
    # modules/flake/git-hooks.nix). Building the check derivation runs
    # every hook against the tree and fails on any lint/format
    # violation, so this is the CI gate that keeps regressions off main
    # (closes #349). The bespoke drvPath loop in flake-check never ran
    # the hooks.
    #
    # Runs on ubuntu-latest with NO fork guard and NO nix-secrets deploy
    # key: the pre-commit check doesn't touch the private nix-secrets
    # input, so it carries no host-access or secret-exposure risk and can
    # safely cover fork PRs (unlike the self-hosted build/eval jobs).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            lazy-trees = false
            always-allow-substitutes = false
      - name: Run pre-commit hooks
        run: |
          nix build \
            --print-build-logs \
            ".#checks.x86_64-linux.pre-commit"
