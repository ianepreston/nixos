version: 1
metadata:
  name: grafana
entries:
  # ========== Grafana — OIDC ==========
  # Grafana speaks OIDC natively. We use generic_oauth on the grafana
  # side (see modules/system/grafana.nix) and a stock OAuth2 provider
  # here. Same shape as the mealie blueprint; client creds come from
  # sops via the authentik worker's EnvironmentFile, injected by
  # myAuthentik.oidcApps.grafana.
  - model: authentik_providers_oauth2.oauth2provider
    id: prov-grafana
    identifiers:
      name: grafana
    attrs:
      client_type: confidential
      client_id: !Env GRAFANA_OIDC_CLIENT_ID
      client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: https://grafana.@serverDomain@/login/generic_oauth
      access_code_validity: minutes=1
      access_token_validity: minutes=10
      refresh_token_validity: days=30
      sub_mode: hashed_user_id
      issuer_mode: per_provider

  - model: authentik_core.application
    id: app-grafana
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      provider: !KeyOf prov-grafana
      group: Infrastructure
      open_in_new_tab: true
      meta_launch_url: https://grafana.@serverDomain@
      meta_icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/png/grafana.png
      policy_engine_mode: all

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-grafana
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, Infrastructure]]
      enabled: true

  # Prometheus and Alertmanager use forward-auth via the embedded
  # outpost, registered through `myAuthentik.forwardAuthApps` in
  # modules/system/{prometheus,alertmanager}.nix respectively. Their
  # proxy providers, applications, policy bindings, and the outpost's
  # providers list are emitted from modules/platform/authentik.nix's
  # aggregated blueprint — a second outpost block here would clobber
  # the aggregator's providers list at apply time.
