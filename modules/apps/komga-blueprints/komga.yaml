version: 1
metadata:
  name: komga
entries:
  # As of authentik 2025.10 the default email scope mapping returns
  # email_verified: false (security change, goauthentik/authentik#16205).
  # Komga rejects OIDC logins whose email_verified claim isn't true
  # (gotson/komga#1054), so use a custom email scope that hardcodes true.
  # Safe here because all authentik users are admin-provisioned.
  - model: authentik_providers_oauth2.scopemapping
    id: scope-komga-email
    identifiers:
      name: "Komga email (verified)"
    attrs:
      scope_name: email
      description: "Email scope returning email_verified: true for Komga"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: prov-komga
    identifiers:
      name: komga
    attrs:
      client_type: confidential
      client_id: !Env KOMGA_OIDC_CLIENT_ID
      client_secret: !Env KOMGA_OIDC_CLIENT_SECRET
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !KeyOf scope-komga-email
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      # authentik 2026.x added OAuth2Provider.grant_types (ArrayField,
      # default=[]). The authorize view rejects any flow whose grant isn't
      # listed ("Invalid grant_type for provider" -> request malformed), so a
      # provider created fresh on 2026.x from a blueprint that omits this is
      # unusable. Providers created under older authentik were back-filled by
      # the migration, which is why this only bit on a freshly-provisioned host
      # (amos1) and not one carried over from an earlier version (hpp-1).
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: https://komga.@serverDomain@/login/oauth2/code/authentik
      access_code_validity: minutes=1
      access_token_validity: minutes=10
      refresh_token_validity: days=30
      sub_mode: hashed_user_id
      issuer_mode: per_provider

  - model: authentik_core.application
    id: app-komga
    identifiers:
      slug: komga
    attrs:
      name: Komga
      provider: !KeyOf prov-komga
      group: Users
      open_in_new_tab: true
      meta_launch_url: https://komga.@serverDomain@
      meta_icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/png/komga.png
      policy_engine_mode: all

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-komga
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, Users]]
      enabled: true
