---
version: 1
metadata:
  name: homelab-users
entries:
  - model: authentik_core.user
    identifiers:
      username: ian
    attrs:
      name: Ian Preston
      email: ian@example.com
      password: !Env IAN_PASSWORD
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, "authentik Admins"]]
        - !Find [authentik_core.group, [name, Home]]
        - !Find [authentik_core.group, [name, Infrastructure]]
        - !Find [authentik_core.group, [name, Users]]
  # Pattern A onboarding: no `password` attr — these accounts exist with
  # the configured groups/email/name but can't authenticate until they
  # set a password via the recovery flow (admin issues a recovery URL or
  # sends a recovery email through the default-recovery-flow). Once set,
  # the password lives on the user row and reconciliation never touches
  # it; group/email/name updates still flow declaratively.
  - model: authentik_core.user
    identifiers:
      username: taylor
    attrs:
      name: Taylor
      email: taylor@example.com
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, Home]]
        - !Find [authentik_core.group, [name, Users]]
  - model: authentik_core.user
    identifiers:
      username: ryan
    attrs:
      name: Ryan
      email: ryan@example.com
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, Users]]
  - model: authentik_core.user
    identifiers:
      username: paul
    attrs:
      name: Paul
      email: paul@example.com
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, Users]]
  - model: authentik_core.user
    identifiers:
      username: ryam
    attrs:
      name: Ryam
      email: ryam@example.com
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, Users]]
