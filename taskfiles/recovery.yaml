---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Recovery tasks — per-app and whole-host restore from restic.
#
# ## Usage
#
#   task recovery:<app>                 # in-place restore on HOST
#       HOST=hpp-1
#       [DEST=<ip-or-host>]              # default: same as HOST
#       [SOURCE_HOST=<other-host>]       # default: same as HOST
#
# Each per-app task dispatches to one of three internal templates
# (`_restore-volume`, `_restore-pg`, `_restore-sqlite`) and then runs
# an HTTP health check via `_health` where applicable. `recovery:all`
# runs every app's dispatcher in sequence — use it for catastrophic
# rebuilds.
#
# When you add a new server-app, add a dispatcher here and append it
# to `all`. The shape table in CLAUDE.md ("Recovery tasks: keep the
# per-app list in sync") describes which template applies.
#
# ## Verification drill (recovery:test:full)
#
# Spins up a tests-server quickemu VM, reinstalls it from this flake,
# restores mealie + miniflux + jellyfin from SOURCE_HOST's restic repo
# (exercising the three app shapes), and tears the VM down. Quarterly
# cadence — see issue #135 for the rationale.

version: '3'
set: [pipefail]
shopt: [globstar]
tasks:

  # ---------------------------------------------------------------------------
  # Internal templates
  # ---------------------------------------------------------------------------
  #
  # These do the actual restic + systemd + (postgres|sqlite) dance.
  # Per-app dispatchers below populate UNITS / PATHS / DB / SWAPS and
  # call the matching template. Marked `internal: true` so they don't
  # appear in `task --list`.

  _restore-volume:
    internal: true
    requires:
      vars: [HOST, APP, UNITS, PATHS]
    vars:
      DEST: '{{.DEST | default .HOST}}'
      SOURCE_HOST: '{{.SOURCE_HOST | default .HOST}}'
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
      # Override for cross-environment restore (dev→prod or prod→dev).
      # Defaults to /mnt/backups (same-environment); set to
      # /mnt/<otherEnv>-backups when SOURCE_HOST lives in the other env.
      REPO_MOUNT: '{{.REPO_MOUNT | default "/mnt/backups"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring {{.APP}} on {{.HOST}} (volume-only) from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<EOF
        set -euo pipefail
        REPO={{.REPO_MOUNT}}/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password

        for u in {{.UNITS}}; do
          echo "[+] Stopping \$u"
          systemctl stop "\$u" || true
        done

        includes=""
        for p in {{.PATHS}}; do
          includes="\$includes --include \$p"
        done
        echo "[+] Restoring paths: {{.PATHS}}"
        # --delete: remove files at the destination within the included
        # paths that aren't in the snapshot. Makes restore a clean
        # operation rather than an overlay — see issue #217.
        # shellcheck disable=SC2086
        restic -r "\$REPO" --password-file "\$PASS_FILE" \
          restore latest --target / --delete \$includes

        for u in {{.UNITS}}; do
          echo "[+] Starting \$u"
          systemctl start "\$u"
        done
        EOF

  _restore-pg:
    internal: true
    requires:
      vars: [HOST, APP, UNITS, DB]
    vars:
      DEST: '{{.DEST | default .HOST}}'
      SOURCE_HOST: '{{.SOURCE_HOST | default .HOST}}'
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
      # Extra non-postgres paths to restore alongside /var/backup/postgresql
      # (e.g. /var/lib/<app> for native apps with on-disk state, or
      # /var/lib/containers/<app> for containerized + pg shapes).
      PATHS: '{{.PATHS | default ""}}'
      # See _restore-volume for REPO_MOUNT semantics.
      REPO_MOUNT: '{{.REPO_MOUNT | default "/mnt/backups"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring {{.APP}} on {{.HOST}} (postgres + paths) from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<EOF
        set -euo pipefail
        REPO={{.REPO_MOUNT}}/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password
        DB={{.DB}}

        for u in {{.UNITS}}; do
          echo "[+] Stopping \$u"
          systemctl stop "\$u" || true
        done

        includes="--include /var/backup/postgresql"
        for p in {{.PATHS}}; do
          includes="\$includes --include \$p"
        done
        echo "[+] Restoring /var/backup/postgresql {{.PATHS}}"
        # --delete: see comment in _restore-volume.
        # shellcheck disable=SC2086
        restic -r "\$REPO" --password-file "\$PASS_FILE" \
          restore latest --target / --delete \$includes

        echo "[+] Replaying \$DB database from pg_dumpall"
        sudo -u postgres dropdb --if-exists "\$DB"
        sudo -u postgres createdb -O "\$DB" "\$DB"
        # pg_dumpall layout: \connect <db> introduces a section, but
        # CREATE DATABASE <next>; for the SUCCEEDING db appears between
        # the current \connect block and the next \connect — so flip
        # in_target off on both, or psql will try to recreate already-
        # provisioned databases.
        zcat /var/backup/postgresql/all.sql.gz | awk -v db="\$DB" '
          /^\\\\connect / { name = \$2; gsub(/"/, "", name); in_target = (name == db); next }
          /^CREATE DATABASE / { in_target = 0; next }
          in_target { print }
        ' | sudo -u postgres psql -v ON_ERROR_STOP=1 "\$DB"

        for u in {{.UNITS}}; do
          echo "[+] Starting \$u"
          systemctl start "\$u"
        done
        EOF

  _restore-sqlite:
    internal: true
    requires:
      vars: [HOST, APP, UNITS, PATHS, SWAPS]
    vars:
      DEST: '{{.DEST | default .HOST}}'
      SOURCE_HOST: '{{.SOURCE_HOST | default .HOST}}'
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
      # SWAPS format: space-separated triples "src:dst:owner". The
      # token "@env@" in `owner` is replaced with "server-<env>" where
      # <env> is detected from /etc/passwd on the target — lets one
      # SWAPS string apply on both server-dev and server-prod hosts.
      # See _restore-volume for REPO_MOUNT semantics.
      REPO_MOUNT: '{{.REPO_MOUNT | default "/mnt/backups"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Restoring {{.APP}} on {{.HOST}} (sqlite-quiesce) from {{.SOURCE_HOST}}'s restic repo\x1B[0m"
        ssh -p {{.SSH_PORT}} -oForwardAgent=yes {{.TARGET_USER}}@{{.DEST}} \
          'sudo bash -se' <<EOF
        set -euo pipefail
        REPO={{.REPO_MOUNT}}/restic/{{.SOURCE_HOST}}
        PASS_FILE=/run/secrets/restic/password

        SERVER_USER=\$(getent passwd server-prod >/dev/null && echo server-prod || echo server-dev)

        for u in {{.UNITS}}; do
          echo "[+] Stopping \$u"
          systemctl stop "\$u" || true
        done

        includes=""
        for p in {{.PATHS}}; do
          includes="\$includes --include \$p"
        done
        echo "[+] Restoring paths: {{.PATHS}}"
        # --delete: see comment in _restore-volume.
        # shellcheck disable=SC2086
        restic -r "\$REPO" --password-file "\$PASS_FILE" \
          restore latest --target / --delete \$includes

        for triple in {{.SWAPS}}; do
          IFS=":" read -r src dst owner <<<"\$triple"
          owner=\${owner//@env@/\$SERVER_USER}
          echo "[+] Swapping \$dst <- \$src (owner: \$owner)"
          install -o "\$owner" -g servers -m 0640 "\$src" "\$dst"
        done

        for u in {{.UNITS}}; do
          echo "[+] Starting \$u"
          systemctl start "\$u"
        done
        EOF

  _health:
    internal: true
    requires:
      vars: [HOST, APP, URL]
    vars:
      DEST: '{{.DEST | default .HOST}}'
      SSH_PORT: '{{.SSH_PORT | default "22"}}'
      TARGET_USER: '{{.TARGET_USER | default "ipreston"}}'
      EXPECT: '{{.EXPECT | default "200"}}'
      RETRIES: '{{.RETRIES | default "30"}}'
      SLEEP: '{{.SLEEP | default "2"}}'
    cmds:
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Asserting HTTP {{.EXPECT}} on {{.APP}} ({{.URL}})\x1B[0m"
        ssh -p {{.SSH_PORT}} {{.TARGET_USER}}@{{.DEST}} "
          set -euo pipefail
          for i in \$(seq 1 {{.RETRIES}}); do
            code=\$(curl -s -o /dev/null -w '%{http_code}' '{{.URL}}' || true)
            if [ \"\$code\" = '{{.EXPECT}}' ]; then echo '{{.APP}}: {{.EXPECT}} OK'; exit 0; fi
            sleep {{.SLEEP}}
          done
          echo '{{.APP}}: did not return {{.EXPECT}} within {{.RETRIES}}x{{.SLEEP}}s (last code: '\$code')'
          exit 1
        "

  # ---------------------------------------------------------------------------
  # Per-app dispatchers
  # ---------------------------------------------------------------------------
  # Keep this list in sync with modules/profiles/server-apps.nix and
  # the `all` aggregate below. See CLAUDE.md "Recovery tasks" for the
  # shape → template mapping.

  actualbudget:
    desc: Restore actualbudget (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: actualbudget
          UNITS: 'podman-actualbudget.service'
          PATHS: '/var/lib/containers/actualbudget'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  audiobookshelf:
    desc: Restore audiobookshelf (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: audiobookshelf
          UNITS: 'audiobookshelf.service'
          PATHS: '/var/lib/audiobookshelf /var/backup/sqlite/audiobookshelf'
          SWAPS: '/var/backup/sqlite/audiobookshelf/absdatabase.sqlite:/var/lib/audiobookshelf/config/absdatabase.sqlite:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: audiobookshelf, URL: 'http://127.0.0.1:13378/healthcheck', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  authentik:
    desc: Restore authentik (native + postgres, peer auth)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: authentik
          UNITS: 'authentik.service authentik-worker.service authentik-migrate.service'
          PATHS: '/var/lib/private/authentik'
          DB: authentik
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  bambuddy:
    desc: Restore bambuddy (container + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: bambuddy
          UNITS: 'podman-bambuddy.service'
          PATHS: '/var/lib/containers/bambuddy /var/backup/sqlite/bambuddy'
          SWAPS: '/var/backup/sqlite/bambuddy/bambuddy.db:/var/lib/containers/bambuddy/data/bambuddy.db:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: bambuddy, URL: 'http://127.0.0.1:8008/', EXPECT: '200', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  bazarr:
    desc: Restore bazarr (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: bazarr
          UNITS: 'bazarr.service'
          PATHS: '/var/lib/bazarr /var/backup/sqlite/bazarr'
          SWAPS: '/var/backup/sqlite/bazarr/bazarr.db:/var/lib/bazarr/db/bazarr.db:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: bazarr, URL: 'http://127.0.0.1:6767/', EXPECT: '200', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  bookorbit:
    desc: Restore bookorbit (containerized + postgres)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: bookorbit
          UNITS: 'podman-bookorbit.service'
          PATHS: '/var/lib/containers/bookorbit'
          DB: bookorbit
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: bookorbit, URL: 'http://127.0.0.1:3017/api/v1/health', EXPECT: '200', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  gatus:
    desc: Restore gatus (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: gatus
          UNITS: 'gatus.service'
          PATHS: '/var/lib/gatus /var/backup/sqlite/gatus'
          SWAPS: '/var/backup/sqlite/gatus/data.db:/var/lib/gatus/data.db:gatus'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  grimmory:
    desc: Restore grimmory (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: grimmory
          UNITS: 'podman-grimmory.service'
          PATHS: '/var/lib/containers/grimmory'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  homeassistant:
    desc: Restore home-assistant (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: homeassistant
          UNITS: 'podman-homeassistant.service'
          PATHS: '/var/lib/containers/homeassistant'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  jellyfin:
    desc: Restore jellyfin (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: jellyfin
          UNITS: 'jellyfin.service'
          PATHS: '/var/lib/jellyfin /var/backup/sqlite/jellyfin'
          SWAPS: '/var/backup/sqlite/jellyfin/jellyfin.db:/var/lib/jellyfin/data/jellyfin.db:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: jellyfin, URL: 'http://127.0.0.1:8096/health', RETRIES: '60', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  kapowarr:
    desc: Restore kapowarr (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: kapowarr
          UNITS: 'podman-kapowarr.service'
          PATHS: '/var/lib/containers/kapowarr'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  kavita:
    desc: Restore kavita (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: kavita
          UNITS: 'kavita.service'
          PATHS: '/var/lib/kavita /var/backup/sqlite/kavita'
          SWAPS: '/var/backup/sqlite/kavita/kavita.db:/var/lib/kavita/config/kavita.db:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  komga:
    desc: Restore komga (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: komga
          UNITS: 'komga.service'
          PATHS: '/var/lib/komga /var/backup/sqlite/komga'
          SWAPS: '/var/backup/sqlite/komga/database.sqlite:/var/lib/komga/database.sqlite:@env@ /var/backup/sqlite/komga/tasks.sqlite:/var/lib/komga/tasks.sqlite:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  matter-server:
    desc: Restore matter-server (native, DynamicUser state under /var/lib/private)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: matter-server
          UNITS: 'matter-server.service'
          PATHS: '/var/lib/private/matter-server'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  mosquitto:
    desc: Restore mosquitto (native MQTT broker)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: mosquitto
          UNITS: 'mosquitto.service'
          PATHS: '/var/lib/mosquitto'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  manyfold:
    desc: Restore manyfold (containerized + postgres)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: manyfold
          UNITS: 'podman-manyfold.service'
          PATHS: '/var/lib/containers/manyfold'
          DB: manyfold
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  mealie:
    desc: Restore mealie (native + postgres, peer auth)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: mealie
          UNITS: 'mealie.service'
          PATHS: '/var/lib/mealie'
          DB: mealie
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: mealie, URL: 'http://127.0.0.1:9925/', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  miniflux:
    desc: Restore miniflux (native + postgres only, no on-disk state)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: miniflux
          UNITS: 'miniflux.service'
          DB: miniflux
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'
      - task: _health
        vars: { HOST: '{{.HOST}}', APP: miniflux, URL: 'http://127.0.0.1:8089/healthcheck', DEST: '{{.DEST}}', SSH_PORT: '{{.SSH_PORT}}' }

  mylar3:
    desc: Restore mylar3 (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: mylar3
          UNITS: 'podman-mylar3.service'
          PATHS: '/var/lib/containers/mylar3'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  paperless-ngx:
    desc: Restore paperless-ngx (native + postgres, four units)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-pg
        vars:
          HOST: '{{.HOST}}'
          APP: paperless-ngx
          UNITS: 'paperless-scheduler.service paperless-task-queue.service paperless-consumer.service paperless-web.service'
          PATHS: '/var/lib/paperless-ngx'
          DB: paperless_ngx
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  pinchflat:
    desc: Restore pinchflat (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: pinchflat
          UNITS: 'pinchflat.service'
          PATHS: '/var/lib/pinchflat /var/backup/sqlite/pinchflat'
          SWAPS: '/var/backup/sqlite/pinchflat/pinchflat.db:/var/lib/pinchflat/db/pinchflat.db:@env@'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  profilarr:
    desc: Restore profilarr (container volume)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-volume
        vars:
          HOST: '{{.HOST}}'
          APP: profilarr
          UNITS: 'podman-profilarr.service'
          PATHS: '/var/lib/containers/profilarr'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  prowlarr:
    desc: Restore prowlarr (native + sqlite-quiesce)
    requires: { vars: [HOST] }
    cmds:
      - task: _restore-sqlite
        vars:
          HOST: '{{.HOST}}'
          APP: prowlarr
          UNITS: 'prowlarr.service'
          PATHS: '/var/lib/prowlarr /var/backup/sqlite/prowlarr'
          SWAPS: '/var/backup/sqlite/prowlarr/prowlarr.db:/var/lib/prowlarr/prowlarr.db:prowlarr /var/backup/sqlite/prowlarr/logs.db:/var/lib/prowlarr/logs.db:prowlarr'
          DEST: '{{.DEST}}'
          SOURCE_HOST: '{{.SOURCE_HOST}}'
          SSH_PORT: '{{.SSH_PORT}}'
          REPO_MOUNT: '{{.REPO_MOUNT}}'

  radarr:
    desc: Restore radarr (native + sqlite-quiesce)
