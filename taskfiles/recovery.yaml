  # ---------------------------------------------------------------------------
  # Catastrophic restore — every app
  # ---------------------------------------------------------------------------
  # Order matters where there are explicit dependencies (authentik
  # first, since most apps' OIDC integrations want it reachable),
  # otherwise the rest are per-app independent.

  all:
    desc: Catastrophic restore — every app on HOST from SOURCE_HOST (default same host)
    requires: { vars: [HOST] }
    cmds:
      - task: authentik
      - task: actualbudget
      - task: audiobookshelf
      # bambuddy disabled pending upstream OrcaSlicer fix — see #298.
      # Re-enable when the server-apps profile re-adds it.
      # - task: bambuddy
      - task: bazarr
      - task: bookorbit
      - task: gatus
      - task: grimmory
      - task: homeassistant
      - task: jellyfin
      - task: kapowarr
      - task: kavita
      - task: komga
      - task: manyfold
      - task: matter-server
      - task: mealie
      - task: miniflux
      - task: mosquitto
      - task: mylar3
      - task: paperless-ngx
      - task: pinchflat
      - task: profilarr
      - task: prowlarr
      - task: radarr
      - task: readeck
      - task: readmeabook
      - task: sabnzbd
      - task: seerr
      - task: shelfarr
      - task: sonarr
      - task: spierscraper
      - task: tandoor
      - task: unifi
      - task: valheim
      - task: watchstate

  # ---------------------------------------------------------------------------
  # End-to-end drill: VM up → install → restore three shapes → teardown
  # ---------------------------------------------------------------------------
  # Confirms last night's restic snapshot is actually replayable into a
  # working app for each of the three app shapes (containerized + pg,
  # native + pg only, native + sqlite-quiesce). Quarterly. See issue
  # #135 for the rationale.
  #
  # VM lifecycle (up/install/down/sops-authorize) lives under `task vm:*`
  # in taskfiles/vm.yaml — generic enough to also drive tests-desktop
  # iteration and not tied to the restore drill.

  test:full:
    desc: Quarterly end-to-end drill — VM up, reinstall, restore mealie/miniflux/jellyfin from SOURCE_HOST, teardown
    vars:
      SOURCE_HOST: '{{.SOURCE_HOST | default "hpp-1"}}'
      SSH_PORT: '{{.SSH_PORT | default "22322"}}'
    cmds:
      - task: :vm:up
      - task: :vm:sops-authorize
        vars: { TARGET: '{{.SOURCE_HOST}}' }
      # vm:install routes through bootstrap:reinstall with LOCAL_SECRETS=true
      # (default), so the installed system already reflects local repo
      # state — including the uncommitted sops envelope edits the previous
      # step just made. The bootstrap:reinstall flow also runs sync +
      # rebuild on the target afterwards, but for this drill we only
      # need the install — the per-app restore subtasks below are the
      # actual signal, and a full rebuild on a freshly-installed
      # tests-server would fail on harmless degraded units (tailscale
      # authkey, loki/radarr expecting NFS content paths). Call
      # bootstrap:install directly with the persistent key from vm:up.
      - task: :bootstrap:install
        vars:
          HOST: tests-server
          DEST: 127.0.0.1
          SSH_PORT: '{{.SSH_PORT}}'
          IMPERMANENT: 'true'
          SSH_HOST_KEY_FILE: '{{.HOME}}/vms/nixos-vm/ssh_host_ed25519_key'
          LOCAL_SECRETS: 'true'
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Waiting for tests-server to reboot into installed system\x1B[0m"
        ssh-keygen -R "127.0.0.1" -f ~/.ssh/known_hosts 2>/dev/null || true
        ssh-keygen -R "[127.0.0.1]:{{.SSH_PORT}}" -f ~/.ssh/known_hosts 2>/dev/null || true
        for i in $(seq 1 120); do
          state=$(ssh -p {{.SSH_PORT}} -o ConnectTimeout=2 -o BatchMode=yes \
                      -o StrictHostKeyChecking=accept-new \
                      -o UpdateHostKeys=no \
                      ipreston@127.0.0.1 'systemctl is-system-running' 2>/dev/null || echo connecting)
          case "$state" in
            running|degraded)
              echo -e "\x1B[32m[+] Target reachable (systemd: $state)\x1B[0m"
              break
              ;;
            *)
              sleep 3
              ;;
          esac
        done
      - |
        set -euo pipefail
        # Seed sentinel files inside the paths the upcoming restores
        # will --include. If the snapshot doesn't contain these names
        # (and it won't — they're random), --delete should remove them,
        # locking in clean-restore semantics. See issue #217.
        echo -e "\x1B[32m[+] Seeding sentinel files to verify clean-restore semantics\x1B[0m"
        ssh -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new ipreston@127.0.0.1 \
          'sudo bash -se' <<'EOF'
        set -euo pipefail
        mkdir -p /var/lib/mealie /var/lib/jellyfin /var/backup/sqlite/jellyfin
        touch /var/lib/mealie/.recovery-overlay-sentinel
        touch /var/lib/jellyfin/.recovery-overlay-sentinel
        touch /var/backup/sqlite/jellyfin/.recovery-overlay-sentinel
        echo "[+] sentinels placed"
        EOF
      - task: mealie
        vars: { HOST: tests-server, DEST: 127.0.0.1, SSH_PORT: '{{.SSH_PORT}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - task: miniflux
        vars: { HOST: tests-server, DEST: 127.0.0.1, SSH_PORT: '{{.SSH_PORT}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - task: jellyfin
        vars: { HOST: tests-server, DEST: 127.0.0.1, SSH_PORT: '{{.SSH_PORT}}', SOURCE_HOST: '{{.SOURCE_HOST}}' }
      - |
        set -euo pipefail
        echo -e "\x1B[32m[+] Asserting sentinels were removed by --delete\x1B[0m"
        ssh -p {{.SSH_PORT}} ipreston@127.0.0.1 'sudo bash -se' <<'EOF'
        set -euo pipefail
        failed=0
        for f in \
          /var/lib/mealie/.recovery-overlay-sentinel \
          /var/lib/jellyfin/.recovery-overlay-sentinel \
          /var/backup/sqlite/jellyfin/.recovery-overlay-sentinel; do
          if [ -e "$f" ]; then
            echo "[!] OVERLAY REGRESSION: $f survived restore"
            failed=1
          else
            echo "[+] OK: $f removed by --delete"
          fi
        done
        exit "$failed"
        EOF
      - task: :vm:down
      - |
        echo ""
        echo -e "\x1B[32m========================================================\x1B[0m"
        echo -e "\x1B[32m  Full restore drill PASSED (tests-server VM, source {{.SOURCE_HOST}})\x1B[0m"
        echo -e "\x1B[32m  Bootstrap + all three app shapes restored cleanly.\x1B[0m"
        echo -e "\x1B[32m========================================================\x1B[0m"
        echo -e "\x1B[33m  Reminder: ../nix-secrets/ now has uncommitted sops envelope changes\x1B[0m"
        echo -e "\x1B[33m  authorizing the VM key. \`cd ../nix-secrets && git restore .\` to revoke,\x1B[0m"
        echo -e "\x1B[33m  or \`task secrets:publish\` to make sticky.\x1B[0m"
