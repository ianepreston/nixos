---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
# Secrets management for ../nix-secrets (sibling repo, consumed as a
# flake input). Wraps `sops` so we generate high-entropy values into
# the right keys instead of editing yaml by hand.
#
# All tasks default to HOST=hpp-1 and refuse to overwrite an existing
# key unless FORCE=true. After running, the file in ../nix-secrets/sops/
# is left modified — commit and push that repo, then
# `nix flake update nix-secrets` here.
version: '3'
set: [pipefail]
shopt: [globstar]
vars:
  SECRETS_DIR:
    sh: echo "$(git rev-parse --show-toplevel)/../nix-secrets"
tasks:
  rekey:
    desc: Re-encrypt every sops/*.yaml in nix-secrets against current .sops.yaml rules
    cmds:
      - |
        set -euo pipefail
        cd "{{.SECRETS_DIR}}"
        for f in sops/*.yaml; do
          echo -e "\x1B[32m[+] updatekeys $f\x1B[0m"
          sops updatekeys --yes "$f"
        done

  edit:*:
    desc: Edit a host's secrets file (e.g. task secrets:edit:hpp-1)
    cmd: |
      cd "{{.SECRETS_DIR}}" && sops sops/{{index .MATCH 0}}.yaml

  view:*:
    desc: Decrypt and print a host's secrets (e.g. task secrets:view:hpp-1)
    cmd: |
      cd "{{.SECRETS_DIR}}" && sops -d sops/{{index .MATCH 0}}.yaml

  oidc:
    desc: 'Generate OIDC client_id + client_secret for APP on HOST. Vars: APP (required), HOST (default hpp-1), FORCE=true to overwrite'
    requires:
      vars: [APP]
    vars:
      HOST: '{{.HOST | default "hpp-1"}}'
      FORCE: '{{.FORCE | default "false"}}'
    cmds:
      - |
        set -euo pipefail
        cd "{{.SECRETS_DIR}}"
        file="sops/{{.HOST}}.yaml"
        [ -f "$file" ] || { echo -e "\x1B[31m[!] $file not found in {{.SECRETS_DIR}}\x1B[0m" >&2; exit 1; }
        existing=$(sops -d "$file" | yq -r '.["{{.APP}}"].oidc_client_id // ""')
        if [ -n "$existing" ] && [ "{{.FORCE}}" != "true" ]; then
          echo -e "\x1B[31m[!] {{.APP}}.oidc_client_id already set in $file (use FORCE=true to overwrite)\x1B[0m" >&2
          exit 1
        fi
        client_id=$(openssl rand -hex 16)
        client_secret=$(openssl rand -hex 32)
        sops set "$file" '["{{.APP}}"]["oidc_client_id"]' "\"$client_id\""
        sops set "$file" '["{{.APP}}"]["oidc_client_secret"]' "\"$client_secret\""
        echo ""
        echo "===  OIDC creds set for {{.APP}} on {{.HOST}}  ==="
        echo "  client_id:     $client_id"
        echo "  client_secret: $client_secret"

  dbpw:
    desc: 'Generate db_password for APP on HOST. Vars: APP (required), HOST (default hpp-1), FORCE=true to overwrite'
    requires:
      vars: [APP]
    vars:
      HOST: '{{.HOST | default "hpp-1"}}'
      FORCE: '{{.FORCE | default "false"}}'
    cmds:
      - |
        set -euo pipefail
        cd "{{.SECRETS_DIR}}"
        file="sops/{{.HOST}}.yaml"
        [ -f "$file" ] || { echo -e "\x1B[31m[!] $file not found in {{.SECRETS_DIR}}\x1B[0m" >&2; exit 1; }
        existing=$(sops -d "$file" | yq -r '.["{{.APP}}"].db_password // ""')
        if [ -n "$existing" ] && [ "{{.FORCE}}" != "true" ]; then
          echo -e "\x1B[31m[!] {{.APP}}.db_password already set in $file (use FORCE=true to overwrite)\x1B[0m" >&2
          exit 1
        fi
        password=$(openssl rand -hex 16)
        sops set "$file" '["{{.APP}}"]["db_password"]' "\"$password\""
        echo ""
        echo "===  db_password set for {{.APP}} on {{.HOST}}  ==="
        echo "  password: $password"

  secret:
    desc: 'Generate a generic high-entropy hex secret at APP.KEY. Vars: APP, KEY (required), HOST (default hpp-1), LEN (random bytes, default 32), FORCE=true to overwrite'
    requires:
      vars: [APP, KEY]
    vars:
      HOST: '{{.HOST | default "hpp-1"}}'
      LEN: '{{.LEN | default "32"}}'
      FORCE: '{{.FORCE | default "false"}}'
    cmds:
      - |
        set -euo pipefail
        cd "{{.SECRETS_DIR}}"
        file="sops/{{.HOST}}.yaml"
        [ -f "$file" ] || { echo -e "\x1B[31m[!] $file not found in {{.SECRETS_DIR}}\x1B[0m" >&2; exit 1; }
        existing=$(sops -d "$file" | yq -r '.["{{.APP}}"]["{{.KEY}}"] // ""')
        if [ -n "$existing" ] && [ "{{.FORCE}}" != "true" ]; then
          echo -e "\x1B[31m[!] {{.APP}}.{{.KEY}} already set in $file (use FORCE=true to overwrite)\x1B[0m" >&2
          exit 1
        fi
        value=$(openssl rand -hex {{.LEN}})
        sops set "$file" '["{{.APP}}"]["{{.KEY}}"]' "\"$value\""
        echo ""
        echo "===  {{.APP}}.{{.KEY}} set on {{.HOST}}  ==="
        echo "  value: $value"
